# In-cluster inventory demo lock loop (applied by k8s/demo-lock-loop.sh via envsubst).
# Placeholders: NAMESPACE, SERVICE_ACCOUNT_BLOCK, DEMO_LOCK_SECONDS,
# DEMO_LOCK_INTERVAL_SECONDS, SUBST_LOCK_URL, SUBST_CURL_URL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-lock-loop
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: demo-lock-loop
    app.kubernetes.io/component: demo-lock-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: demo-lock-loop
  template:
    metadata:
      labels:
        app.kubernetes.io/component: demo-lock-loop
    spec:
${SERVICE_ACCOUNT_BLOCK}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-lock-loop
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DEMO_LOCK_SECONDS
              value: "${DEMO_LOCK_SECONDS}"
            - name: DEMO_LOCK_INTERVAL_SECONDS
              value: "${DEMO_LOCK_INTERVAL_SECONDS}"
            - name: DEMO_LOCK_URL
              value: "${SUBST_LOCK_URL}"
            - name: DEMO_LOCK_CURL_URL
              value: "${SUBST_CURL_URL}"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              URL="${DEMO_LOCK_URL:-${DEMO_LOCK_CURL_URL}}"
              INTERVAL="${DEMO_LOCK_INTERVAL_SECONDS:-60}"
              echo "demo-lock-loop: url=${URL} interval=${INTERVAL}s"
              while true; do
                echo "==== $(date -Iseconds) POST inventory demo lock ===="
                if curl -sS -X POST "${URL}" -w "\nHTTP %{http_code}\n"; then
                  echo "==== request sent ===="
                else
                  echo "==== curl failed (is product-service up? is WALLMART_DEMO_CHAOS_ENABLED=true?) ====" >&2
                fi
                sleep "${INTERVAL}"
              done
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
