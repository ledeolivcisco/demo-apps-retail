{{- if and .Values.mssql.createSecret (not .Values.mssql.existingSecret) }}
{{- if not .Values.mssql.password }}
{{- fail "mssql.password is required when mssql.createSecret is true. Set via --set mssql.password=... or values-local.yaml" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wallmart.mssqlSecretName" . }}
  namespace: {{ include "wallmart.namespace" . }}
  labels:
    {{- include "wallmart.labels" . | nindent 4 }}
type: Opaque
stringData:
  MSSQL_SA_PASSWORD: {{ .Values.mssql.password | quote }}
  WALLMART_DB_PASSWORD: {{ .Values.mssql.password | quote }}
{{- end }}
