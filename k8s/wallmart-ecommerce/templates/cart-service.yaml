{{- if .Values.cartService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceNames.cartService }}
  namespace: {{ include "wallmart.namespace" . }}
  labels:
    {{- include "wallmart.componentLabels" (dict "root" . "component" .Values.serviceNames.cartService) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.cartService.port }}
      targetPort: http
  selector:
    {{- include "wallmart.componentSelectorLabels" (dict "root" . "component" .Values.serviceNames.cartService) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.serviceNames.cartService }}
  namespace: {{ include "wallmart.namespace" . }}
  labels:
    {{- include "wallmart.componentLabels" (dict "root" . "component" .Values.serviceNames.cartService) | nindent 4 }}
spec:
  replicas: {{ .Values.cartService.replicaCount }}
  selector:
    matchLabels:
      {{- include "wallmart.componentSelectorLabels" (dict "root" . "component" .Values.serviceNames.cartService) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wallmart.componentSelectorLabels" (dict "root" . "component" .Values.serviceNames.cartService) | nindent 8 }}
    spec:
      {{- if .Values.openshift.enabled }}
      serviceAccountName: wallmart-app
      {{- end }}
      securityContext:
        {{- include "wallmart.podSecurityContext" . | nindent 8 }}
      initContainers:
        {{- include "wallmart.waitForSqlInitContainer" (dict "root" .) | nindent 8 }}
        {{- include "wallmart.waitForProductInitContainer" (dict "root" .) | nindent 8 }}
      containers:
        - name: cart-service
          image: {{ include "wallmart.appImage" (dict "root" . "repository" "cart-service") }}
          imagePullPolicy: Always
          securityContext:
            {{- include "wallmart.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.cartService.port }}
          env:
            {{- include "wallmart.dbEnv" (dict "root" . "dbBootstrap" .Values.cartService.dbBootstrap) | nindent 12 }}
            - name: WALLMART_PRODUCT_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "wallmart.fullname" . }}-app-config
                  key: WALLMART_PRODUCT_SERVICE_BASE_URL
            - name: WALLMART_PAYMENT_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "wallmart.fullname" . }}-app-config
                  key: WALLMART_PAYMENT_SERVICE_BASE_URL
          resources:
            {{- toYaml .Values.cartService.resources | nindent 12 }}
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
{{- end }}
