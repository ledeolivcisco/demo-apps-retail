# Copy to values-local.yaml (gitignored) for local overrides.
#   cp values-local.example.yaml values-local.yaml

global:
  imageRegistry: leandrovo
  imageTag: latest

# Required at install — use a strong password (MSSQL complexity rules apply).
mssql:
  password: "REPLACE_ME"

# OpenShift / ROSA — required for nginx, SQL Server, and Playwright on restricted SCC.
openshift:
  enabled: true

# kind/minikube: LoadBalancer on Docker Desktop — use port 8080 (host :80 is often taken).
# OpenShift: nginx listens on 8080 (non-root); service port should match.
ecommerceWeb:
  service:
    type: LoadBalancer
    port: 8080
  image:
    # tag: splunk   # or appd — overrides global.imageTag for storefront only

# Docker Desktop / Apple Silicon: cluster nodes are arm64 — do not require amd64 nodeSelector.
sqlserver:
  nodeSelector: {}

# Enable synthetic Playwright loop.
synthetic:
  enabled: true
  playwright:
    baseUrl: http://ecommerce-web:8080

# appConfig:
#   demoChaosEnabled: true   # required for k8s/demo-lock-loop.sh
